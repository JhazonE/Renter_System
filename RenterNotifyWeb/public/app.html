<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renter Notify — Meal-Ticket Alerts</title>
  <link rel="icon" href="/assets/icon.png" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .app-wrap { max-width: 560px; margin: 0 auto; padding: 24px 20px 60px; }

    .signin-card, .panel {
      background: #fff; border: 1px solid var(--border);
      border-radius: 18px; padding: 26px; margin-top: 18px;
    }
    .app-title { display: flex; align-items: center; gap: 12px; margin-top: 28px; }
    .app-title img { width: 44px; height: 44px; border-radius: 11px; }
    .app-title h1 { font-size: 22px; }
    .app-title p { font-size: 13px; color: var(--muted); }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #334155; margin-bottom: 6px; }
    .field input {
      width: 100%; border: 1px solid #cbd5e1; border-radius: 10px;
      padding: 12px 14px; font-size: 16px; color: var(--ink);
    }
    .field input:focus { outline: none; border-color: var(--teal); }

    .btn {
      width: 100%; background: var(--teal); color: #fff; border: none;
      font-size: 16px; font-weight: 700; padding: 14px; border-radius: 12px;
      cursor: pointer; transition: background 0.12s ease;
    }
    .btn:hover { background: var(--teal-dark); }
    .btn:disabled { opacity: 0.6; cursor: default; }
    .btn-ghost {
      background: transparent; color: var(--teal); border: 1px solid var(--border);
      font-weight: 600; font-size: 14px; padding: 10px;
    }
    .btn-ghost:hover { background: #f8fafc; }

    .error { color: #dc2626; font-size: 14px; margin-top: 4px; min-height: 18px; }
    .hint { font-size: 12px; color: #94a3b8; margin-top: 14px; text-align: center; }

    .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .who h2 { font-size: 18px; }
    .who .role {
      display: inline-block; margin-top: 4px; font-size: 12px; font-weight: 600;
      color: var(--teal); background: #ccfbf1; padding: 3px 10px; border-radius: 999px;
    }
    .live { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 1.6s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .alerts { list-style: none; margin-top: 18px; display: grid; gap: 10px; }
    .alert {
      border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px;
      display: flex; align-items: center; gap: 12px; background: #fff;
    }
    .alert.fresh { animation: flash 1.4s ease; }
    @keyframes flash { 0% { background: #ccfbf1; } 100% { background: #fff; } }
    .alert .icon { font-size: 22px; }
    .alert .body { flex: 1; }
    .alert .body .t { font-weight: 600; font-size: 15px; }
    .alert .body .s { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .alert .when { font-size: 12px; color: #94a3b8; text-align: right; white-space: nowrap; }

    .empty { text-align: center; color: var(--muted); padding: 30px 0; font-size: 14px; }
    .toolbar { display: flex; gap: 10px; margin-top: 18px; }
    .toolbar .btn { width: auto; flex: 1; }
    .back-link { display: inline-block; margin-top: 22px; font-size: 13px; color: var(--teal); }
  </style>
</head>
<body>
  <div class="app-wrap">
    <div class="app-title">
      <img src="/assets/icon.png" alt="Renter Notify" />
      <div>
        <h1>Meal-Ticket Alerts</h1>
        <p>See your alerts right here in the browser — no install needed.</p>
      </div>
    </div>

    <!-- Sign-in -->
    <section class="signin-card" id="signinCard">
      <div class="field">
        <label for="reg">Registration Number</label>
        <input id="reg" inputmode="text" placeholder="e.g. 100245" autocomplete="off" />
      </div>
      <div class="field">
        <label for="phone">Phone Number</label>
        <input id="phone" inputmode="tel" placeholder="e.g. 09171234567" autocomplete="off" />
      </div>
      <button class="btn" id="signinBtn">View my alerts</button>
      <p class="error" id="signinError"></p>
      <p class="hint">We match your phone to a parent or student on the registration.</p>
    </section>

    <!-- Alerts panel -->
    <section class="panel" id="panel" style="display:none;">
      <div class="panel-head">
        <div class="who">
          <h2 id="whoName">—</h2>
          <span class="role" id="whoRole">—</span>
        </div>
        <span class="live"><span class="dot"></span> Live</span>
      </div>

      <ul class="alerts" id="alertsList"></ul>
      <div class="empty" id="emptyMsg" style="display:none;">No meal-ticket alerts yet.</div>

      <div class="toolbar">
        <button class="btn btn-ghost" id="notifyBtn">🔔 Enable browser alerts</button>
        <button class="btn btn-ghost" id="logoutBtn">Sign out</button>
      </div>
      <p class="hint">Keep this page open to get notified. Refreshes automatically.</p>
    </section>

    <a class="back-link" href="/">← Back to download page</a>
  </div>

  <script src="/app.js"></script>
</body>
</html>
