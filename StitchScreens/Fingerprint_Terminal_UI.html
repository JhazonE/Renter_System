<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SecureAccess Biometric Terminal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1132d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101322",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .scan-area-glow {
            background: radial-gradient(circle, rgba(17, 50, 212, 0.15) 0%, rgba(16, 19, 34, 0) 70%);
        }
        .fingerprint-scanner {
            background: linear-gradient(180deg, rgba(17, 50, 212, 0.05) 0%, rgba(17, 50, 212, 0.1) 100%);
            border: 1px solid rgba(17, 50, 212, 0.3);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center overflow-hidden">
<div class="relative w-full max-w-[480px] h-[800px] bg-slate-900/50 dark:bg-background-dark border border-slate-800 rounded-xl shadow-2xl flex flex-col overflow-hidden">
<header class="flex items-center justify-between px-8 py-10">
<div class="flex flex-col gap-1">
<span class="text-xs font-bold tracking-widest uppercase text-primary/80">System Ready</span>
<h1 class="text-2xl font-bold tracking-tight text-slate-100">Identity Verification</h1>
</div>
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center border border-primary/20">
<span class="material-symbols-outlined text-primary text-2xl">shield_locked</span>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-8">
<div class="relative w-full aspect-square flex items-center justify-center">
<div class="absolute inset-0 scan-area-glow rounded-full"></div>
<div class="relative w-64 h-80 fingerprint-scanner rounded-3xl flex items-center justify-center shadow-[0_0_40px_rgba(17,50,212,0.1)] group">
<div class="absolute inset-x-0 top-0 h-1 bg-primary shadow-[0_0_15px_rgba(17,50,212,1)] opacity-50"></div>
<span class="material-symbols-outlined text-primary/40 text-[120px] select-none" style="font-variation-settings: 'wght' 200;">
                        fingerprint
                    </span>
<div class="absolute -top-4 -left-4 w-8 h-8 border-t-2 border-l-2 border-primary/40"></div>
<div class="absolute -top-4 -right-4 w-8 h-8 border-t-2 border-right-2 border-primary/40 border-r-2"></div>
<div class="absolute -bottom-4 -left-4 w-8 h-8 border-b-2 border-l-2 border-primary/40"></div>
<div class="absolute -bottom-4 -right-4 w-8 h-8 border-b-2 border-r-2 border-primary/40"></div>
</div>
</div>
<div class="mt-12 text-center space-y-4 w-full">
<h2 class="text-xl font-medium text-slate-100">Place Finger on Sensor</h2>
<p class="text-slate-400 text-sm max-w-[240px] mx-auto">Hold your finger steady until the scanning process is complete.</p>
<div class="pt-6 px-4">
<div class="flex justify-between items-end mb-2">
<span class="text-xs font-bold text-primary tracking-tighter uppercase">Scanning Depth</span>
<span class="text-xs font-mono text-slate-500">65%</span>
</div>
<div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full shadow-[0_0_10px_rgba(17,50,212,0.5)]" style="width: 65%;"></div>
</div>
</div>
</div>
</main>
<footer class="p-8 flex flex-col items-center gap-6">
<div class="flex gap-4 w-full">
<div class="flex-1 p-3 rounded-lg bg-slate-800/40 border border-slate-700/50 flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-slate-500 text-sm">sensors</span>
<span class="text-[10px] uppercase font-bold text-slate-400">Sensor Active</span>
</div>
<div class="flex-1 p-3 rounded-lg bg-slate-800/40 border border-slate-700/50 flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-slate-500 text-sm">wifi</span>
<span class="text-[10px] uppercase font-bold text-slate-400">Encrypted</span>
</div>
<div class="flex-1 p-3 rounded-lg bg-slate-800/40 border border-slate-700/50 flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-slate-500 text-sm">history</span>
<span class="text-[10px] uppercase font-bold text-slate-400">Logs Ready</span>
</div>
</div>
<div class="flex items-center gap-2 opacity-40">
<div class="size-4 text-slate-100">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M47.2426 24L24 47.2426L0.757355 24L24 0.757355L47.2426 24ZM12.2426 21H35.7574L24 9.24264L12.2426 21Z" fill="currentColor" fill-rule="evenodd"></path>
</svg>
</div>
<span class="text-sm font-bold tracking-tight text-slate-100">SecureAccess™</span>
</div>
</footer>
<div class="absolute inset-0 pointer-events-none border-[12px] border-background-dark/80 rounded-xl"></div>
</div>
</body></html>
